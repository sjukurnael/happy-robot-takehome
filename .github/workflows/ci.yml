name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Go vet + the integration suite against a real Postgres — the same
  # tests `make test` runs locally. The suite creates and migrates its own
  # taskman_test database, so it needs nothing beyond a reachable server.
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: taskman
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d taskman"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Vet
        working-directory: server
        run: go vet ./...
      - name: Integration tests (Postgres)
        working-directory: server
        run: go test ./...
      - name: API contract drift check (tygo)
        working-directory: server
        run: |
          go tool tygo generate
          git diff --exit-code ../client/src/generated/api.ts \
            || (echo "::error::client/src/generated/api.ts is stale — run 'make gen-types' and commit the result" && exit 1)

  # Type-check, lint, unit tests, and a production build of the client.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Lint
        working-directory: client
        run: npm run lint
      - name: Unit tests
        working-directory: client
        run: npm test
      - name: Type-check + build
        working-directory: client
        run: npm run build

  # Playwright against the real composed stack (Postgres + migrations +
  # Go server + nginx-served client) — the same images `make up` builds.
  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: docker compose --profile app up -d --build --wait
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: e2e tests
        working-directory: client
        run: npx playwright test
      - name: Server logs (on failure)
        if: failure()
        run: docker compose --profile app logs --no-color
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
