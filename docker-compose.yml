services:
  db:
    image: postgres:16-alpine
    container_name: taskman_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: taskman
    ports:
      - "5432:5432"
    volumes:
      - taskman_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d taskman"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  taskman_pgdata:
