# Generates the TypeScript side of the API contract from the Go structs —
# run via `make gen-types` (which runs `go tool tygo generate` in server/).
# Only models.go and events.go are included: together they are the entire
# wire contract (domain records, patches, stats, WS envelope, event
# payloads, event-type constants). Internal types (Store, Hub, wsClient)
# never leak into the frontend.
packages:
  - path: "github.com/happyrobot/taskman/server"
    output_path: "../client/src/generated/api.ts"
    include_files:
      - "models.go"
      - "events.go"
    type_mappings:
      time.Time: "string /* RFC 3339 */"
      json.RawMessage: "unknown"
    frontmatter: |
      // Code generated by tygo from the Go structs in server/models.go and
      // server/events.go — DO NOT EDIT. Regenerate with `make gen-types`.
      // Hand-written refinements (e.g. the TaskStatus union) live in
      // ../types.ts, which re-exports from this file.
